                                                      - heading "Individual Counseling" [level=3]
                                                      - paragraph: Overcome personal challenges — life transitions, perfectionism, work stressors, relationships, and behavior change. Don't wait until you're in crisis to make a positive change.
                                                    - generic:
                                                      - generic: spa
                                                      - heading "Trauma Informed Therapy" [level=3]
                                                      - paragraph: Feel safe, secure, and rebuild a life worth living. We'll explore your narrative, understand triggers, and help you regain a sense of control after traumatic experiences.
                                                    - generic:
                                                      - generic: favorite_border
                                                      - heading "Grief Counseling" [level=3]
                                                      - paragraph: Navigate loss — anticipated, sudden, or the complex grief of "grieving the living" through addiction, estrangement, or cognitive conditions. You don't have to do this alone.
                                                    - generic:
                                                      - generic: diversity_3
                                                      - heading "Group Therapy" [level=3]
                                                      - paragraph: Join 8-week support groups for connection and new coping skills. Groups include Mom Support, Grief Support, and a Self-Help Book Club.
                                                    - generic:
                                                      - img
                                                      - heading "Career Mentorship" [level=3]
                                                      - paragraph: Pursuing a mental health career? Seeking supervision in PA? Starting a private practice? I help future counselors navigate their path in mental health.
                                                    - generic:
