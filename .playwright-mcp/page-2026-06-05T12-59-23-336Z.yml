            - heading "help_outline How is pricing determined?" [level=3] [ref=e220]:
              - generic [ref=e221]: help_outline
              - text: How is pricing determined?
            - paragraph [ref=e222]: Every business is different in size, goals, and the tools they need. We work with you to build a plan that fits your stage — from a simple website + booking setup to a full platform with AI and automations. Pricing is based on the tools you use, your support level, and the scope of setup work.
          - generic [ref=e224]:
            - heading "help_outline Is there a contract or long-term commitment?" [level=3] [ref=e225]:
              - generic [ref=e226]: help_outline
              - text: Is there a contract or long-term commitment?
            - paragraph [ref=e227]: We offer month-to-month and annual plans. Annual plans come with a meaningful discount. We believe in earning your business every month — not locking you in.
          - generic [ref=e229]:
            - heading "help_outline Can I add tools later as my business grows?" [level=3] [ref=e230]:
              - generic [ref=e231]: help_outline
              - text: Can I add tools later as my business grows?
            - paragraph [ref=e232]: Absolutely. Most clients start with Launch (website + booking) and add email marketing, CRM, automations, and AI as they grow. The platform is designed to scale with you — there's no migration cost to unlock new tools.
          - generic [ref=e234]:
            - heading "help_outline Do you offer white-label or agency plans?" [level=3] [ref=e235]:
              - generic [ref=e236]: help_outline
              - text: Do you offer white-label or agency plans?
            - paragraph [ref=e237]: Yes. Enterprise clients can white-label the platform under their own brand and use it to serve their own clients. We also offer agency licensing for teams who want to build multiple client sites on one account. Book a call to discuss what that looks like for your business.
