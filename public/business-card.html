<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simpler Development - Business Card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 40px;
      padding: 40px;
    }

    h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #888;
    }

    .card {
      width: 3.5in;
      height: 2in;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.08);
      position: relative;
    }

    /* === FRONT === */
    .card-front {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
    }

    .logo-text {
      font-size: 18px;
      letter-spacing: -0.3px;
      color: #fff;
    }
    .logo-text b {
      font-weight: 900;
    }

    .tagline {
      font-size: 8.5px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #777;
      margin-top: 2px;
    }

    /* === BACK === */
    .card-back {
      background: #ffffff;
      color: #111;
      display: flex;
      padding: 24px 28px;
      position: relative;
    }

    .card-back::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle at top right, rgba(0,0,0,0.03) 0%, transparent 70%);
    }

    .back-content {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 100%;
    }

    .back-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-logo-icon {
      width: 28px;
      height: 28px;
    }

    .back-logo-text {
      font-size: 13px;
      color: #111;
      letter-spacing: -0.2px;
    }
    .back-logo-text b {
      font-weight: 900;
    }

    .back-details {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 9px;
      color: #555;
      letter-spacing: 0.3px;
    }

    .detail-row svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .detail-row a {
      color: #555;
      text-decoration: none;
    }

    .accent-line {
      width: 24px;
      height: 2px;
      background: linear-gradient(90deg, #111, transparent);
      margin-bottom: 8px;
    }

    .qr-code {
      position: absolute;
      bottom: 16px;
      right: 20px;
      width: 56px;
      height: 56px;
      border: 1px solid #eee;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-code svg {
      width: 100%;
      height: 100%;
    }

    /* Print styles */
    @media print {
      body { background: white; gap: 20px; }
      h2 { display: none; }
      .card { box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
