name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that's hard or impossible today?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Include API/MCP-tool/UI shape if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've weighed, and why they fall short.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Admin panel
        - Client portal
        - Public sites / blocks / visual editor
        - CRM
        - Company Brain (AI/RAG)
        - MCP server / tools
        - Automations / cron
        - Billing / Stripe
        - Auth / tenancy
        - Developer experience / docs
        - Other
    validations:
      required: true
