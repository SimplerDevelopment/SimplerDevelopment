name: Fallow (code quality — report only)

# REPORT-ONLY: posts a Fallow audit summary as a sticky PR comment and never
# fails the check (no --fail-on-issues; the audit step is continue-on-error).
# Audit is scoped to the PR diff vs its base and grandfathered against the saved
# baselines in fallow-baselines/, so only NET-NEW issues are surfaced.
#
# To RATCHET to a blocking check later: add `--fail-on-issues` to the audit step
# and drop `continue-on-error`, then make this a required status check.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: fallow-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fallow-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so --base can diff against the PR base

      - uses: oven-sh/setup-bun@v2

      - name: Fallow audit (report-only)
        id: audit
        continue-on-error: true
        run: |
          ARGS=(audit --base "origin/${{ github.base_ref }}" \
                --format pr-comment-github --quiet --explain \
                --output-file fallow-comment.md)
          for pair in dead-code-baseline:dead-code.json \
                      health-baseline:health.json \
                      dupes-baseline:dupes.json; do
            f="fallow-baselines/${pair##*:}"
            [ -f "$f" ] && ARGS+=("--${pair%%:*}" "$f")
          done
          bunx fallow "${ARGS[@]}" || true
          [ -f fallow-comment.md ] || echo "_Fallow produced no report for this diff._" > fallow-comment.md

      - name: Upsert sticky PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          marker="<!-- fallow-audit -->"
          body="$marker"$'\n'"$(cat fallow-comment.md)"
          existing=$(gh api "repos/$REPO/issues/$PR/comments" \
            --jq "first(.[] | select(.body | startswith(\"$marker\")) | .id)" || true)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$existing" -f body="$body" >/dev/null
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" -f body="$body" >/dev/null
          fi
