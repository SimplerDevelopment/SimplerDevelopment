# Railway deployment for the Yjs realtime server.
#
# Required env (set in the Railway service):
#   REALTIME_JWT_SECRET           — shared with the sd2026 Next.js app
#   REALTIME_INTERNAL_SECRET      — shared with MCP / internal write channel
#   DATABASE_URL                  — same Postgres as sd2026 (snapshots write
#                                   to posts.content / pitch_decks.slides /
#                                   email_campaigns.block_content)
#
# Optional:
#   REALTIME_PORT                 — defaults to 3030; Railway also sets PORT,
#                                   we read REALTIME_PORT first.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node node_modules/.bin/tsx src/server.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
